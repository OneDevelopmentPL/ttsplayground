<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Playground - Premium Text-to-Speech Launcher</title>
    <meta name="description" content="A powerful and sleek Text-to-Speech launcher with speed, pitch, and voice controls. Multilingual support for English and Polish.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="theme-blue">
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <i class="ph ph-waveform"></i>
                <h1 id="ui-title">TTS Playground</h1>
            </div>
            <div class="header-actions">
                <button id="lang-toggle" class="btn-toggle" aria-label="Switch Language">
                    <span class="lang-text">EN / PL</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Text Input Area -->
            <section class="input-section glass">
                <div class="section-header">
                    <h2 id="ui-input-label">Enter Text Below</h2>
                    <span class="char-count" id="char-count">0 characters</span>
                </div>
                <textarea id="text-input" placeholder="Type or paste your text here..." spellcheck="false"></textarea>
                <div class="input-footer">
                    <button id="btn-clear" class="btn-secondary">
                        <i class="ph ph-trash"></i> <span id="ui-clear">Clear</span>
                    </button>
                </div>
            </section>

            <!-- Controls Sidebar/Panel -->
            <aside class="controls-panel glass">
                <div class="control-group">
                    <label id="ui-voice-label">Voice & Language</label>
                    <select id="voice-select" class="custom-select">
                        <option value="" disabled selected id="ui-loading-voices">Loading voices...</option>
                    </select>
                </div>

                <div class="control-group">
                    <div class="label-row">
                        <label id="ui-speed-label">Speed</label>
                        <span id="speed-val">1.0x</span>
                    </div>
                    <input type="range" id="rate" min="0.5" max="3" step="0.1" value="1">
                </div>

                <div class="control-group">
                    <div class="label-row">
                        <label id="ui-pitch-label">Pitch</label>
                        <span id="pitch-val">1.0</span>
                    </div>
                    <input type="range" id="pitch" min="0" max="2" step="0.1" value="1">
                </div>

                <div class="playback-controls">
                    <button id="btn-play" class="btn-primary main-btn">
                        <i class="ph ph-play"></i> <span id="ui-play">Speak</span>
                    </button>
                    <button id="btn-stop" class="btn-danger">
                        <i class="ph ph-stop"></i> <span id="ui-stop">Stop</span>
                    </button>
                </div>

                <div class="extra-actions">
                    <button id="btn-download" class="btn-secondary full-width">
                        <i class="ph ph-download-simple"></i> <span id="ui-download">Download MP3</span>
                    </button>
                </div>
            </aside>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="footer-status">
                <span id="status-text">Ready to speak</span>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="main.js"></script>
</body>
</html>
